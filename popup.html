<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblical Highlighter</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 240px;
      max-height: 580px;
      padding: 12px;
      font-family: sans-serif;
      overflow-y: auto;
    }

    h3 {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 8px 0;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h3>Biblical Highlighter</h3>

  <label>
    <input type="checkbox" id="enabled">
    Enable Highlighting
  </label>

  <label>
    <input type="checkbox" id="strictMode">
    Strict Context Mode
  </label>

  <label>
    <input type="checkbox" id="highlightPronouns">
    Highlight Pronouns
  </label>

  <label>
    <input type="checkbox" id="autoCaptureOnPageLoad">
    Auto capture on page load
  </label>

  <label>
    <input type="checkbox" id="showPageOverlay">
    Show page overlay
  </label>

  <button id="runFullAnalysis">Run Full Analysis</button>
  <button id="openStudyPanel">Open Study Panel</button>
  <button id="clearPageData">Clear Page Data</button>

  <hr>

  <section class="analysis-summary">
    <p>Capture status: <span id="analysisStatus">Not run</span></p>
    <p>Saved captures: <span id="historyCount">0</span></p>
    <p>Timeline items: <span id="timelineCount">0</span></p>
    <p>Event candidates: <span id="eventCount">0</span></p>
    <p>Ordered events: <span id="orderedEventCount">0</span></p>
    <p>Actor timelines: <span id="actorTimelineCount">0</span></p>
    <p>Interactions: <span id="interactionCount">0</span></p>
    <p>Scenes: <span id="sceneCount">0</span></p>
    <p>Principles: <span id="principleCount">0</span></p>
    <p>Last analysis: <span id="lastAnalysisAt">Never</span></p>
  </section>

  <section id="captureSummary" class="capture-summary" hidden>
    <h4>Latest Capture</h4>
    <p id="captureTitle"></p>
    <dl>
      <div>
        <dt>Words</dt>
        <dd id="captureWords">0</dd>
      </div>
      <div>
        <dt>Characters</dt>
        <dd id="captureCharacters">0</dd>
      </div>
      <div>
        <dt>Divine refs</dt>
        <dd id="captureDivineRefs">0</dd>
      </div>
    </dl>
  </section>

  <p class="formatter-status">Last format matches: <span id="formatterMatchCount">0</span></p>

  <hr>

  <details class="advanced-qa">
    <summary>Advanced / QA</summary>
    <button id="capture">Capture Page Text</button>
    <button id="copyCapture" disabled>Copy Captured Text</button>
    <button id="clearHistory" disabled>Clear History</button>
    <button id="extractTimeline" disabled>Extract Timeline</button>
    <ul id="timelineSnippets" class="timeline-snippets"></ul>
    <button id="copyTimelineItems" disabled>Copy Timeline Items</button>
    <button id="clearTimeline" disabled>Clear Timeline</button>
    <button id="extractEvents" disabled>Extract Events</button>
    <ul id="eventSnippets" class="event-snippets"></ul>
    <button id="copyEventItems" disabled>Copy Event Items</button>
    <button id="clearEvents" disabled>Clear Events</button>
    <button id="extractPrinciples" disabled>Extract Principles</button>
    <button id="copyPrinciples" disabled>Copy Principles</button>
    <button id="clearPrinciples" disabled>Clear Principles</button>
    <button id="orderEvents" disabled>Order Events</button>
    <ul id="orderedEventSnippets" class="ordered-event-snippets"></ul>
    <button id="copyOrderedEvents" disabled>Copy Ordered Events</button>
    <button id="clearOrderedEvents" disabled>Clear Ordered Events</button>
    <button id="buildActorTimelines" disabled>Build Actor Timelines</button>
    <ul id="actorTimelineSnippets" class="actor-timeline-snippets"></ul>
    <button id="copyActorTimelines" disabled>Copy Actor Timelines</button>
    <button id="clearActorTimelines" disabled>Clear Actor Timelines</button>
    <button id="clearCapture" disabled>Clear Capture</button>
  </details>
  <p id="captureStatus" class="capture-status" role="status"></p>

  <script src="popup.js"></script>
</body>
</html>
